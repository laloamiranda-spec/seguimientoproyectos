<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recuperar contraseña — Entregables+</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #4F46E5; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #EEF2FF 0%, #F8FAFC 60%, #E0F2FE 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      width: 100%; max-width: 420px; border-radius: 16px;
      box-shadow: 0 8px 40px rgba(79,70,229,.12); border: none; padding: 2.5rem 2rem;
    }
    .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.15); }
    .btn-primary { background: var(--primary); border-color: var(--primary); font-weight: 600; }
  </style>
</head>
<body>
<div class="card">
  <div class="text-center mb-4">
    <div style="width:56px;height:56px;border-radius:50%;background:#EEF2FF;
                display:flex;align-items:center;justify-content:center;margin:0 auto 1rem">
      <i class="bi bi-key" style="font-size:1.6rem;color:var(--primary)"></i>
    </div>
    <h5 class="fw-bold mb-1">Recuperar contraseña</h5>
    <p class="text-muted mb-0" style="font-size:.88rem">
      Escribe tu correo y te enviaremos un enlace para restablecer tu contraseña.
    </p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
    <div class="alert alert-{{ 'danger' if category == 'error' else category }} py-2"
         style="font-size:.85rem">
      <i class="bi bi-info-circle me-1"></i>{{ message }}
    </div>
    {% endfor %}
  {% endwith %}

  <form method="POST" action="{{ url_for('recuperar_contrasena') }}">
    <div class="mb-4">
      <label class="form-label fw-600 mb-1">Correo electrónico</label>
      <input type="email" name="email" class="form-control"
             placeholder="correo@empresa.com" required autofocus>
    </div>
    <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
      <i class="bi bi-send me-1"></i>Enviar enlace de recuperación
    </button>
    <div class="text-center">
      <a href="{{ url_for('login') }}" class="text-decoration-none"
         style="font-size:.85rem;color:var(--primary)">
        <i class="bi bi-arrow-left me-1"></i>Volver al inicio de sesión
      </a>
    </div>
  </form>
</div>
</body>
</html>
