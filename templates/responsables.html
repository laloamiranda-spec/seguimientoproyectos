{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3"><div><h2 class="fw-bold">Responsables</h2><p class="text-muted">Capacidad de horas por semana.</p></div></div>
<form method="POST" class="row g-2 mb-3">
  <div class="col-md-5"><input name="nombre" class="form-control" placeholder="Nombre" required></div>
  <div class="col-md-4"><input type="number" name="capacidad_horas_semana" class="form-control" placeholder="Horas/sem" min="1" required></div>
  <div class="col-md-3"><button class="btn btn-primary w-100">Agregar</button></div>
</form>
<div class="card p-3"><div class="table-responsive"><table class="table align-middle"><thead><tr><th>Nombre</th><th>Capacidad h/sem</th></tr></thead><tbody>{% for r in responsables %}<tr><td>{{ r.nombre }}</td><td>{{ r.capacidad_horas_semana }}</td></tr>{% endfor %}</tbody></table></div></div>
{% endblock %}
